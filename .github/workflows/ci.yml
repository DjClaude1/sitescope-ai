name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Next.js reads NEXT_PUBLIC_* at build time. Empty values are fine for
      # lint/typecheck/build — the app runs in degraded (no-auth/no-billing)
      # mode when these are absent. Real values are only needed at runtime on
      # Vercel.
      NEXT_PUBLIC_SUPABASE_URL: ""
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ""
      NEXT_PUBLIC_PAYPAL_CLIENT_ID: ""
      NEXT_PUBLIC_PAYPAL_PLAN_ID: ""
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
